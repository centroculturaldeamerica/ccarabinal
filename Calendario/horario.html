<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horario Diversificado 2026 — Centro Cultural de América</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../estilos/horario.css">
  <link rel="icon" href="../Imagenes/imagen_circular_recortada.png" type="image/x-icon">

</head>

<body>

  <!-- ── TOP BAR ── -->
  <header class="topbar">
    <div>
      <div class="topbar-title">
        Centro Cultural de América — <span>Horario Diversificado 2026</span>
      </div>
      <div class="topbar-sub">Asignación de horario para docentes</div>
    </div>
    <button class="export-btn" onclick="window.print()">🖨 Imprimir horario</button>
  </header>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-section">
        <div class="sidebar-label">Nueva clase</div>

        <!-- 1. Grado -->
        <div class="form-group">
          <label for="inp-grado">1. Grado</label>
          <div class="select-wrap">
            <select id="inp-grado">
              <option value="">— Seleccionar —</option>
              <option value="PRIMERO BÁSICO">1ro. Básico</option>
              <option value="SEGUNDO BÁSICO">2do. Básico</option>
              <option value="TERCERO BÁSICO">3ro. Básico</option>
              <option value="CUARTO BACH">4to. Bachillerato</option>
              <option value="QUINTO BACH">5to. Bachillerato</option>
              <option value="CUARTO PC">4to. Perito Contador</option>
              <option value="QUINTO PC">5to. Perito Contador</option>
              <option value="SEXTO PC">6to. Perito Contador</option>
            </select>
          </div>
        </div>

        <!-- 2. Docente (se llena según grado) -->
        <div class="form-group">
          <label for="inp-docente">2. Docente</label>
          <div class="select-wrap">
            <select id="inp-docente" disabled>
              <option value="">— Seleccionar grado primero —</option>
            </select>
          </div>
        </div>

        <!-- 3. Curso (se llena según grado + docente) -->
        <div class="form-group">
          <label for="inp-curso">3. Curso</label>
          <div class="select-wrap">
            <select id="inp-curso" disabled>
              <option value="">— Seleccionar docente primero —</option>
            </select>
          </div>
        </div>

        <!-- 4. Día -->
        <div class="form-group">
          <label for="inp-dia">4. Día</label>
          <div class="select-wrap">
            <select id="inp-dia">
              <option value="">— Seleccionar —</option>
              <option value="L">Lunes</option>
              <option value="M">Martes</option>
              <option value="X">Miércoles</option>
              <option value="J">Jueves</option>
              <option value="V">Viernes</option>
            </select>
          </div>
        </div>

        <!-- 5. Hora inicio -->
        <div class="form-group">
          <label for="inp-inicio">5. Hora de inicio</label>
          <div class="select-wrap">
            <select id="inp-inicio">
              <option value="">— Seleccionar —</option>
            </select>
          </div>
        </div>

        <!-- 6. Hora fin -->
        <div class="form-group">
          <label for="inp-fin">6. Hora de fin</label>
          <div class="select-wrap">
            <select id="inp-fin">
              <option value="">— Seleccionar —</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Color de la clase</label>
          <div class="color-row" id="color-row"></div>
        </div>

        <button class="add-btn" onclick="agregarClase()">
          <span>＋</span> Agregar al horario
        </button>
      </div>

      <div class="divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-label">Clases agregadas</div>
        <div class="clases-lista" id="clases-lista">
          <div class="empty-state">
            <div class="icon">📅</div>
            Aún no hay clases.<br>Agrega tu primera clase arriba.
          </div>
        </div>
      </div>

    </aside>

    <!-- ── MAIN ── -->
    <main class="main">
      <div class="main-header">
        <div class="main-title">Horario <span> de cursos</span></div>
        <div class="day-tabs" id="day-tabs">
          <button class="day-tab active" data-day="ALL">Todos</button>
          <button class="day-tab" data-day="L">Lunes</button>
          <button class="day-tab" data-day="M">Martes</button>
          <button class="day-tab" data-day="X">Miércoles</button>
          <button class="day-tab" data-day="J">Jueves</button>
          <button class="day-tab" data-day="V">Viernes</button>
        </div>
      </div>

      <div class="table-wrap" id="table-wrap"></div>

      <div class="stats-bar" id="stats-bar"></div>
    </main>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Modal confirmar eliminación -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <h3>¿Eliminar esta clase?</h3>
      <p id="modal-desc"></p>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
        <button class="modal-confirm" id="modal-confirm">Sí, eliminar</button>
      </div>
    </div>
  </div>

  <script src="../funtions/horario.js"></script>
</body>

</html>
